<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>POO Mayor y Menor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
              <h1 class="h4 mb-0">POO Mayor y Menor</h1>
            </div>

            <div class="card-body">
              <form>
                <div class="mb-3">
                  <label for="numNumero1" class="form-label">Primer numero</label>
                  <input type="number" class="form-control" id="numNumero1" placeholder="Ingrese el primer numero">
                </div>

                <div class="mb-3">
                  <label for="numNumero2" class="form-label">Segundo numero</label>
                  <input type="number" class="form-control" id="numNumero2" placeholder="Ingrese el segundo numero">
                </div>

                <div class="mb-4">
                  <label for="numNumero3" class="form-label">Tercer numero</label>
                  <input type="number" class="form-control" id="numNumero3" placeholder="Ingrese el tercer numero">
                </div>

                <button type="button" class="btn btn-primary w-100" id="btn_verificar">Verificar</button>
              </form>
            </div>
          </div>

          <section class="alert alert-info mt-4" aria-live="polite">
            <h2 class="h5">Respuesta</h2>
            <p class="mb-0" id="resultado2">Aqui se mostrara el numero mayor y el numero menor.</p>
          </section>
        </div>
      </div>
    </main>
    <script  type="module" src="dist/objetoMayorMenor.js"></script>
  </body>
</html>
