<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="bg-light">
        <nav class="main-nav">
            <div class="container nav-content">
                <a class="nav-brand" href="index.html">TypeScript</a>
                <div class="nav-links">
                    <a href="problema1.html">Problema 1</a>
                    <a href="problema2.html">Problema 2</a>
                    <a href="problema3.html">Problema 3</a>
                    <a href="problema4.html">Problema 4</a>
                    <a href="problema5.html">Problema 5</a>

                    <a href="problema9.html">Problema 9</a>
                    <a href="problema10.html">Problema 10</a>
                </div>
            </div>
        </nav>

        <main class="container py-5 page-scroll">
            <section class="bg-white rounded shadow-sm p-4 p-md-5">
                <h1 class="display-5 fw-bold text-primary">Problema 9</h1>
                <hr class="mb-4">

                <div class="content-list">
                    <article class="content-section">
                        <h2 class="section-title">Numero primo</h2>

                        <div class="section-body">
                            <p>Ingrese un numero para verificar si es primo.</p>

                            <form class="mt-4">
                                <div class="mb-3">
                                    <label for="numPrimo" class="form-label">Numero</label>
                                    <input type="number" class="form-control" id="numPrimo" min="1" required>
                                </div>

                                <button type="button" class="btn btn-primary" id="btnPrimo">Verificar</button>
                            </form>

                            <div id="divResultado" class="alert alert-info mt-4 mb-0" role="alert"></div>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <script>
            const scrollContainer = document.querySelector(".page-scroll");
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(({ isIntersecting, target }) => {
                    if (isIntersecting) {
                        target.classList.add("visible");
                    }
                });
            }, {
                root: scrollContainer,
                threshold: 0.2
            });

            document.querySelectorAll("p").forEach((paragraph) => {
                paragraph.classList.add("scroll-reveal");
                observer.observe(paragraph);
            });
        </script>
        <script src="dist/solucion9.js"></script>
    </body>
</html>
